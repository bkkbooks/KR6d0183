front:
  text: 國清百錄序隋沙門灌頂撰先師以陳太建七年歲次乙未初隱天台所止之峰舊名佛隴詢訪土人云遊其山者多見佛像故相傳因而成稱至太建十年歲在戊戌降陳宣帝勅名修禪寺吏部尚書毛喜題篆牓送安寺門到太隋開皇十八年其歲戊午太尉晉王於山下為先師創寺因山為稱是曰天台王登尊極以大業元年龍集乙丑勅江陽名僧云昔為智者創寺權因山稱今須立名經論之內有何勝目可各述所懷朕自詳擇諸僧表兩名一云禪門一云五淨居其表未奏而僧使智璪啟國清之瑞勅云此是我先師之靈瑞即用即用勅取江都宮大牙殿牓填以雌黃書以大篆遣兼內史通事舍人盧政力送安寺門國清之稱從而為始先師神光而生結跏而滅處證妙法出作帝師備是渚宮法論會稽智果國清灌頂等三傳所載又沙門智寂編集先師遣迎信命搜訪未周而智寂身故筆墨之功與氣俱棄余覽其草本續更撰次諸經方法等合得一百條呼為國清百錄貽示後昆知盛德之在茲國清百錄序丹丘沙門有嚴述夫事無鴻纖但有補於見聞使人警寤而趨善道者則不可以不錄而貽諸後也昔我祖智者禪師本靈山聖眾之一人也陳隋朝出現世間代佛宣祕為人天眼目六十餘州直指人心具佛知見加修圓行則妙果不遠復其所談教法外餘事委積章安尊者撮其可錄者凡一百條以國清為目天聖年中伏蒙聖朝編入大藏既緘以函帙故世人罕得而見之禪師自開皇十七年丁巳入滅至紹聖四年足五百歲明年春四明陳宗逸始謀鏤版印行果冠冕法俗因得以讀之有以知禪師釋部中豪傑之士也雖不得而見其面讀其文亦得以見其心見心愈於見面也奉命序述以冠首云
